<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WARMODE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05050a;--surface:#0a0a12;--card:#0e0e18;--border:#1a1a28;--border2:#242436;
  --red:#e63946;--orange:#f4872a;--gold:#ffd166;--green:#7bed9f;--blue:#4cc9f0;--purple:#c77dff;
  --text:#eeeef5;--muted:#55556a;--muted2:#8888aa;--accent:#fff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;display:flex;flex-direction:column;}

/* ── NOISE OVERLAY ── */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:.4;}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;height:100%;overflow-y:auto;overflow-x:hidden;}
.screen.active{display:flex;}

/* ════════════════════════════════
   SCREEN 0 — LANDING
════════════════════════════════ */
#s-landing{background:var(--bg);justify-content:space-between;padding:0;}
.land-hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px 20px;position:relative;overflow:hidden;}
.land-glow{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(230,57,70,0.12) 0%,transparent 65%);top:50%;left:50%;transform:translate(-50%,-55%);pointer-events:none;}
.land-glow2{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(199,125,255,0.06) 0%,transparent 65%);top:30%;left:60%;pointer-events:none;}
.land-badge{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--muted2);margin-bottom:20px;padding:5px 16px;border:1px solid var(--border2);border-radius:2px;}
.land-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(72px,22vw,110px);line-height:.85;letter-spacing:4px;text-align:center;position:relative;}
.land-title span.w{color:var(--red);}
.land-title span.m{color:var(--accent);}
.land-line{width:40px;height:2px;background:var(--red);margin:18px auto;}
.land-sub{font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);text-align:center;line-height:1.6;}
.land-modules{display:flex;gap:10px;margin-top:28px;}
.land-mod{flex:1;padding:10px 8px;border:1px solid var(--border2);border-radius:8px;text-align:center;background:rgba(255,255,255,0.02);}
.land-mod-icon{font-size:20px;margin-bottom:4px;}
.land-mod-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);}
.land-bottom{padding:24px;}
.land-cta{width:100%;padding:16px;background:var(--red);border:none;border-radius:4px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;cursor:pointer;position:relative;overflow:hidden;}
.land-cta::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.1) 0%,transparent 50%);}
.land-cta2{width:100%;padding:13px;background:transparent;border:1px solid var(--border2);border-radius:4px;color:var(--muted2);font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;margin-top:8px;}

/* ════════════════════════════════
   SCREEN 1 — QUESTIONNAIRE
════════════════════════════════ */
#s-questionnaire{padding:0;}
.q-header{padding:20px 20px 0;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.q-back{width:36px;height:36px;border:1px solid var(--border2);border-radius:6px;background:transparent;color:var(--muted2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.q-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);letter-spacing:2px;}
.q-progress{height:2px;background:var(--border);margin:16px 20px 0;border-radius:1px;flex-shrink:0;}
.q-progress-fill{height:100%;background:var(--red);border-radius:1px;transition:width .4s ease;}
.q-body{flex:1;padding:24px 20px;overflow-y:auto;}
.q-step{display:none;}.q-step.active{display:block;}
.q-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);margin-bottom:6px;}
.q-question{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:var(--accent);line-height:1.2;margin-bottom:20px;}
.q-opts{display:flex;flex-direction:column;gap:8px;}
.q-opt{padding:14px 16px;border:1px solid var(--border2);border-radius:8px;background:var(--card);cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .15s;}
.q-opt:active{transform:scale(0.98);}
.q-opt.selected{border-color:var(--red);background:rgba(230,57,70,0.08);}
.q-opt-icon{font-size:20px;width:28px;text-align:center;flex-shrink:0;}
.q-opt-text{flex:1;}
.q-opt-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--accent);}
.q-opt-sub{font-size:12px;color:var(--muted2);margin-top:1px;}
.q-opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.q-opt-grid{padding:14px 10px;border:1px solid var(--border2);border-radius:8px;background:var(--card);cursor:pointer;text-align:center;transition:all .15s;}
.q-opt-grid:active{transform:scale(0.97);}
.q-opt-grid.selected{border-color:var(--red);background:rgba(230,57,70,0.08);}
.q-opt-grid-icon{font-size:22px;margin-bottom:5px;}
.q-opt-grid-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--accent);}
.q-opt-grid-sub{font-size:10px;color:var(--muted2);margin-top:2px;}
.q-footer{padding:16px 20px;flex-shrink:0;}
.q-next{width:100%;padding:15px;background:var(--red);border:none;border-radius:4px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;cursor:pointer;opacity:.4;transition:opacity .2s;}
.q-next.ready{opacity:1;}
.q-input{width:100%;background:var(--card);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:600;padding:14px 16px;outline:none;margin-bottom:8px;}
.q-input:focus{border-color:var(--red);}
.q-input-hint{font-size:12px;color:var(--muted2);}
.combat-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.combat-opt{padding:12px 10px;border:1px solid var(--border2);border-radius:8px;background:var(--card);cursor:pointer;text-align:center;transition:all .15s;}
.combat-opt.selected{border-color:var(--orange);background:rgba(244,135,42,0.08);}
.combat-opt-icon{font-size:24px;margin-bottom:4px;}
.combat-opt-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--accent);}
.combat-opt-sub{font-size:10px;color:var(--muted2);margin-top:1px;}

/* ════════════════════════════════
   SCREEN 2 — GENERATING
════════════════════════════════ */
#s-generating{align-items:center;justify-content:center;gap:20px;background:var(--bg);}
.gen-glow{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(230,57,70,0.1) 0%,transparent 65%);pointer-events:none;}
.gen-logo{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:4px;color:var(--red);}
.gen-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase;}
.gen-sub{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--muted2);letter-spacing:2px;text-transform:uppercase;text-align:center;padding:0 30px;}
.gen-bar{width:200px;height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
.gen-bar-fill{height:100%;background:var(--red);border-radius:1px;animation:genbar 3s ease-in-out infinite;}
@keyframes genbar{0%{width:0;opacity:1}70%{width:100%;opacity:1}100%{width:100%;opacity:0}}
.gen-dots{display:flex;gap:6px;}
.gen-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:dot .8s ease-in-out infinite;}
.gen-dot:nth-child(2){animation-delay:.15s;}
.gen-dot:nth-child(3){animation-delay:.3s;}
@keyframes dot{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

/* ════════════════════════════════
   SCREEN 3 — PROGRAMME
════════════════════════════════ */
#s-programme{padding:0;}
.prog-header{padding:16px 18px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.prog-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--red);letter-spacing:3px;}
.prog-actions{display:flex;gap:8px;}
.prog-action{padding:6px 12px;border:1px solid var(--border2);border-radius:6px;background:transparent;color:var(--muted2);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;cursor:pointer;}
.prog-body{flex:1;padding:14px 18px;overflow-y:auto;}
.prog-profile{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.prog-profile-icon{font-size:28px;}
.prog-profile-name{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--accent);letter-spacing:1px;}
.prog-profile-sub{font-size:11px;color:var(--muted2);margin-top:2px;}
.prog-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.prog-tag{font-size:10px;padding:2px 8px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;}
.prog-tag.red{background:rgba(230,57,70,0.15);color:var(--red);}
.prog-tag.orange{background:rgba(244,135,42,0.15);color:var(--orange);}
.prog-tag.green{background:rgba(123,237,159,0.15);color:var(--green);}
.prog-tag.purple{background:rgba(199,125,255,0.15);color:var(--purple);}
.prog-content{font-size:14px;line-height:1.7;color:var(--text);}
.prog-content h2{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--red);margin:18px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.prog-content h3{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--accent);margin:12px 0 5px;letter-spacing:1px;}
.prog-content p{color:var(--muted2);margin-bottom:8px;font-size:13px;}
.prog-content strong{color:var(--text);}
.prog-content ul{padding-left:0;list-style:none;display:flex;flex-direction:column;gap:5px;}
.prog-content li{font-size:13px;color:var(--muted2);padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;border-left:3px solid var(--red);}
.prog-content li strong{color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;}
.prog-footer{padding:14px 18px;flex-shrink:0;}
.prog-save{width:100%;padding:14px;background:var(--red);border:none;border-radius:4px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:2px;cursor:pointer;}
.prog-new{width:100%;padding:11px;background:transparent;border:1px solid var(--border2);border-radius:4px;color:var(--muted2);font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;margin-top:6px;}
.error-box{background:rgba(230,57,70,0.08);border:1px solid rgba(230,57,70,0.3);border-radius:10px;padding:14px;font-size:13px;color:#ff8090;line-height:1.6;}


.q-opt.multi-selected,.q-opt-grid.multi-selected,.combat-opt.multi-selected{border-color:var(--red);background:rgba(230,57,70,0.08);}
.q-opt .check,.q-opt-grid .check,.combat-opt .check{width:18px;height:18px;border:2px solid var(--border2);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s;margin-left:auto;}
.q-opt.multi-selected .check,.q-opt-grid.multi-selected .check,.combat-opt.multi-selected .check{background:var(--red);border-color:var(--red);}
.multi-hint{font-size:11px;color:var(--muted2);margin-bottom:12px;padding:6px 10px;background:rgba(255,255,255,0.03);border-radius:6px;border-left:2px solid var(--red);}

/* Scrollbar */
::-webkit-scrollbar{width:0;}
</style>
</head>
<body>

<!-- ══════════════ SCREEN 0 — LANDING ══════════════ -->
<div class="screen active" id="s-landing">
  <div class="land-hero">
    <div class="land-glow"></div>
    <div class="land-glow2"></div>
    <div class="land-badge">Programme IA · Personnalisé</div>
    <div class="land-title"><span class="w">WAR</span><br><span class="m">MODE</span></div>
    <div class="land-line"></div>
    <div class="land-sub">Ton programme.<br>Ton niveau. Ta discipline.</div>
    <div class="land-modules">
      <div class="land-mod">
        <div class="land-mod-icon">🏋️</div>
        <div class="land-mod-lbl">Musculation</div>
      </div>
      <div class="land-mod">
        <div class="land-mod-icon">🥊</div>
        <div class="land-mod-lbl">Combat</div>
      </div>
      <div class="land-mod">
        <div class="land-mod-icon">📈</div>
        <div class="land-mod-lbl">Progression</div>
      </div>
    </div>
  </div>
  <div class="land-bottom">
    <button class="land-cta" onclick="startQuestionnaire('muscu')">🏋️ PROGRAMME MUSCULATION</button>
    <button class="land-cta2" onclick="startQuestionnaire('combat')">🥊 PROGRAMME COMBAT</button>
  </div>
</div>

<!-- ══════════════ SCREEN 1 — QUESTIONNAIRE ══════════════ -->
<div class="screen" id="s-questionnaire">
  <div class="q-header">
    <button class="q-back" onclick="goBack()">←</button>
    <div class="q-title" id="q-module-title">MUSCULATION</div>
  </div>
  <div class="q-progress"><div class="q-progress-fill" id="q-progress-fill"></div></div>
  <div class="q-body" id="q-body"></div>
  <div class="q-footer">
    <button class="q-next" id="q-next-btn" onclick="nextStep()">SUIVANT →</button>
  </div>
</div>

<!-- ══════════════ SCREEN 2 — GENERATING ══════════════ -->
<div class="screen" id="s-generating">
  <div class="gen-glow"></div>
  <div class="gen-logo">WARMODE</div>
  <div class="gen-title">Génération en cours</div>
  <div class="gen-bar"><div class="gen-bar-fill"></div></div>
  <div class="gen-sub" id="gen-sub">Analyse de ton profil...</div>
  <div class="gen-dots"><div class="gen-dot"></div><div class="gen-dot"></div><div class="gen-dot"></div></div>
</div>

<!-- ══════════════ SCREEN 3 — PROGRAMME ══════════════ -->
<div class="screen" id="s-programme">
  <div class="prog-header">
    <div class="prog-logo">WARMODE</div>
    <div class="prog-actions">
      <button class="prog-action" onclick="showScreen('s-landing')">← Accueil</button>
    </div>
  </div>
  <div class="prog-body">
    <div class="prog-profile" id="prog-profile"></div>
    <div class="prog-content" id="prog-content"></div>
  </div>
  <div class="prog-footer">
    <button class="prog-save" onclick="saveProgram()">💾 SAUVEGARDER CE PROGRAMME</button>
    <button class="prog-new" onclick="showScreen('s-landing')">+ NOUVEAU PROGRAMME</button>
  </div>
</div>

<script>
// ══ CONFIG ══
const MODULE_LABELS = {muscu:'MUSCULATION', combat:'COMBAT'};

// ══ STATE ══
let currentModule = 'muscu';
let currentStep = 0;
let answers = {};
let totalSteps = 0;

// ══ QUESTIONS MUSCU ══
const QUESTIONS_MUSCU = [
  {
    id:'objectif', label:'Étape 1', question:'Quel est ton objectif principal ?',
    type:'opts',
    options:[
      {icon:'💪',title:'Force pure',sub:'Soulever le plus lourd possible',value:'force'},
      {icon:'📐',title:'Force + Définition',sub:'Progresser et sculpt le corps',value:'force_def'},
      {icon:'🏋️',title:'Prise de masse',sub:'Grossir et gagner du muscle',value:'masse'},
      {icon:'🔥',title:'Perte de poids',sub:'Bruler les graisses, garder le muscle',value:'perte'},
      {icon:'⚡',title:'Endurance musculaire',sub:'Tenir dans la durée',value:'endurance'},
      {icon:'🌱',title:'Remise en forme',sub:'Reprendre une activité physique',value:'remise'},
    ]
  },
  {
    id:'niveau', label:'Étape 2', question:'Quel est ton niveau actuel ?',
    type:'grid',
    options:[
      {icon:'🌱',title:'Débutant',sub:'< 6 mois',value:'debutant'},
      {icon:'📈',title:'Intermédiaire',sub:'6 mois - 2 ans',value:'intermediaire'},
      {icon:'💎',title:'Avancé',sub:'> 2 ans',value:'avance'},
      {icon:'🏆',title:'Expert',sub:'> 5 ans',value:'expert'},
    ]
  },
  {
    id:'seances', label:'Étape 3', question:'Combien de séances par semaine ?',
    type:'grid',
    options:[
      {icon:'1️⃣',title:'1 séance',sub:'Minimum',value:'1'},
      {icon:'2️⃣',title:'2 séances',sub:'Débutant',value:'2'},
      {icon:'3️⃣',title:'3 séances',sub:'Optimal',value:'3'},
      {icon:'4️⃣',title:'4 séances',sub:'Avancé',value:'4'},
      {icon:'5️⃣',title:'5 séances',sub:'Intensif',value:'5'},
      {icon:'6️⃣',title:'6 séances',sub:'Expert',value:'6'},
    ]
  },
  {
    id:'equipement', label:'Étape 4', question:'Quel équipement as-tu ?',
    type:'multi', multi:true,
    options:[
      {icon:'🏠',title:'Poids du corps',sub:'Sans équipement',value:'bodyweight'},
      {icon:'🏋️',title:'Haltères / barres',sub:'À domicile',value:'home_hal'},
      {icon:'🏟️',title:'Salle de sport',sub:'Machines, câbles, barres',value:'salle'},
      {icon:'⚡',title:'CrossFit / Functional',sub:'Kettlebell, anneaux, TRX',value:'crossfit'},
      {icon:'🥊',title:'Salle de combat',sub:'Sac, corde, poids du corps',value:'combat_only'},
    ]
  },
  {
    id:'poids', label:'Étape 5', question:'Quel est ton poids ? (kg)',
    type:'input', placeholder:'Ex: 75', inputType:'number'
  },
  {
    id:'morpho', label:'Étape 6', question:'Ta morphologie naturelle ?',
    type:'grid',
    options:[
      {icon:'🦴',title:'Ectomorphe',sub:'Maigre, du mal à prendre du muscle',value:'ecto'},
      {icon:'🏋️',title:'Mésomorphe',sub:'Athlétique, prend facilement du muscle',value:'meso'},
      {icon:'🍖',title:'Endomorphe',sub:'Costaud, prend facilement du gras',value:'endo'},
      {icon:'❓',title:'Je sais pas',sub:'Le programme s\'adapte',value:'unknown'},
    ]
  },
];

// ══ QUESTIONS COMBAT ══
const QUESTIONS_COMBAT = [
  {
    id:'sport', label:'Étape 1', question:'Quelle est ta discipline ?',
    type:'combat',
    options:[
      {icon:'🥊',title:'Boxe Anglaise',sub:'Poings, footwork, cardio',value:'boxe'},
      {icon:'🦵',title:'Muay Thai',sub:'8 membres, clinch, kicks',value:'muaythai'},
      {icon:'🤼',title:'Lutte',sub:'Takedowns, grappling, explosivité',value:'lutte'},
      {icon:'🥋',title:'JJB',sub:'Sol, soumissions, force de saisie',value:'jjb'},
      {icon:'⚔️',title:'MMA',sub:'Toutes disciplines combinées',value:'mma'},
      {icon:'🤺',title:'Autre sport de combat',sub:'Karate, Judo, Kickboxing...',value:'autre'},
    ]
  },
  {
    id:'niveau', label:'Étape 2', question:'Quel est ton niveau ?',
    type:'grid',
    options:[
      {icon:'🌱',title:'Débutant',sub:'< 1 an de pratique',value:'debutant'},
      {icon:'📈',title:'Intermédiaire',sub:'1 - 3 ans',value:'intermediaire'},
      {icon:'💎',title:'Avancé',sub:'3 - 5 ans',value:'avance'},
      {icon:'🏆',title:'Compétiteur',sub:'Combats réguliers',value:'competiteur'},
    ]
  },
  {
    id:'objectif_combat', label:'Étape 3', question:'Ton objectif principal ?',
    type:'opts',
    options:[
      {icon:'💥',title:'Puissance de frappe',sub:'Frapper plus fort',value:'puissance'},
      {icon:'🫁',title:'Cardio & Endurance',sub:'Tenir plus longtemps',value:'cardio'},
      {icon:'⚡',title:'Explosivité',sub:'Réactions plus rapides',value:'explosivite'},
      {icon:'🛡️',title:'Force générale',sub:'Programme renforcement complet',value:'force'},
      {icon:'🏆',title:'Préparation compétition',sub:'Pic de forme pour un combat',value:'competition'},
    ]
  },
  {
    id:'seances', label:'Étape 4', question:'Séances de renforcement/semaine ?',
    type:'grid',
    options:[
      {icon:'2️⃣',title:'2 séances',sub:'En complément',value:'2'},
      {icon:'3️⃣',title:'3 séances',sub:'Optimal',value:'3'},
      {icon:'4️⃣',title:'4 séances',sub:'Intensif',value:'4'},
      {icon:'5️⃣',title:'5 séances',sub:'Expert',value:'5'},
    ]
  },
  {
    id:'equipement', label:'Étape 5', question:'Quel équipement as-tu ?',
    type:'multi', multi:true,
    options:[
      {icon:'🥊',title:'Salle de combat',sub:'Sac, corde, poids du corps',value:'combat_only'},
      {icon:'🏋️',title:'Salle de sport',sub:'Musculation classique',value:'salle'},
      {icon:'⚡',title:'Functional / CrossFit',sub:'Kettlebell, TRX, anneaux',value:'functional'},
      {icon:'🏠',title:'Domicile',sub:'Haltères, élastiques',value:'home'},
      {icon:'🏊',title:'Piscine',sub:'Natation, cardio aquatique',value:'pool'},
    ]
  },
  {
    id:'poids', label:'Étape 6', question:'Ton poids de combat ? (kg)',
    type:'input', placeholder:'Ex: 75', inputType:'number'
  },
];

// ══ FONCTIONS ══

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuestionnaire(module){
  currentModule = module;
  currentStep = 0;
  answers = {};
  document.getElementById('q-module-title').textContent = MODULE_LABELS[module];
  renderStep();
  showScreen('s-questionnaire');
}

function getQuestions(){
  return currentModule === 'muscu' ? QUESTIONS_MUSCU : QUESTIONS_COMBAT;
}

function renderStep(){
  const questions = getQuestions();
  totalSteps = questions.length;
  const q = questions[currentStep];
  const fill = ((currentStep) / totalSteps * 100);
  document.getElementById('q-progress-fill').style.width = fill + '%';

  const body = document.getElementById('q-body');
  let html = `<div class="q-step active">
    <div class="q-label">${q.label} sur ${totalSteps}</div>
    <div class="q-question">${q.question}</div>`;

  if(q.type === 'opts'){
    html += '<div class="q-opts">';
    q.options.forEach(o=>{
      const sel = answers[q.id]===o.value ? ' selected' : '';
      html += `<div class="q-opt${sel}" onclick="selectOpt('${q.id}','${o.value}',this,'q-opt')">
        <div class="q-opt-icon">${o.icon}</div>
        <div class="q-opt-text"><div class="q-opt-title">${o.title}</div><div class="q-opt-sub">${o.sub}</div></div>
      </div>`;
    });
    html += '</div>';
  } else if(q.type === 'grid'){
    html += '<div class="q-opts-grid">';
    q.options.forEach(o=>{
      const sel = answers[q.id]===o.value ? ' selected' : '';
      html += `<div class="q-opt-grid${sel}" onclick="selectOpt('${q.id}','${o.value}',this,'q-opt-grid')">
        <div class="q-opt-grid-icon">${o.icon}</div>
        <div class="q-opt-grid-title">${o.title}</div>
        <div class="q-opt-grid-sub">${o.sub}</div>
      </div>`;
    });
    html += '</div>';
  } else if(q.type === 'combat'){
    html += '<div class="combat-opts">';
    q.options.forEach(o=>{
      const sel = answers[q.id]===o.value ? ' selected' : '';
      html += `<div class="combat-opt${sel}" onclick="selectOpt('${q.id}','${o.value}',this,'combat-opt')">
        <div class="combat-opt-icon">${o.icon}</div>
        <div class="combat-opt-title">${o.title}</div>
        <div class="combat-opt-sub">${o.sub}</div>
      </div>`;
    });
    html += '</div>';
  } else if(q.type === 'multi'){
    const selected = Array.isArray(answers[q.id]) ? answers[q.id] : [];
    html += '<div class="multi-hint">Tu peux sélectionner plusieurs options</div>';
    html += '<div class="q-opts">';
    q.options.forEach(o=>{
      const isSel = selected.includes(o.value);
      const selCls = isSel ? ' multi-selected' : '';
      html += `<div class="q-opt${selCls}" onclick="toggleMulti('${q.id}','${o.value}',this)">
        <div class="q-opt-icon">${o.icon}</div>
        <div class="q-opt-text"><div class="q-opt-title">${o.title}</div><div class="q-opt-sub">${o.sub}</div></div>
        <div class="check">${isSel ? '✓' : ''}</div>
      </div>`;
    });
    html += '</div>';
  } else if(q.type === 'input'){
    const val = answers[q.id] || '';
    html += `<input class="q-input" type="${q.inputType||'text'}" placeholder="${q.placeholder}" value="${val}" id="q-input-field" oninput="handleInput('${q.id}',this.value)" inputmode="numeric">
    <div class="q-input-hint">Entrez une valeur et appuyez sur Suivant</div>`;
  }

  html += '</div>';
  body.innerHTML = html;
  updateNextBtn();

  // Focus input si besoin
  if(q.type === 'input'){
    setTimeout(()=>{
      const inp = document.getElementById('q-input-field');
      if(inp) inp.focus();
    }, 100);
  }
}

function selectOpt(qid, val, el, cls){
  answers[qid] = val;
  document.querySelectorAll('.'+cls).forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
  updateNextBtn();
}

function handleInput(qid, val){
  if(val) answers[qid] = val;
  else delete answers[qid];
  updateNextBtn();
}

function toggleMulti(qid, val, el){
  if(!Array.isArray(answers[qid])) answers[qid] = [];
  const idx = answers[qid].indexOf(val);
  if(idx === -1){
    answers[qid].push(val);
    el.classList.add('multi-selected');
    el.querySelector('.check').textContent = '✓';
  } else {
    answers[qid].splice(idx,1);
    el.classList.remove('multi-selected');
    el.querySelector('.check').textContent = '';
  }
  updateNextBtn();
}

function updateNextBtn(){
  const questions = getQuestions();
  const q = questions[currentStep];
  const btn = document.getElementById('q-next-btn');
  const hasAnswer = Array.isArray(answers[q.id]) ? answers[q.id].length > 0 : (answers[q.id] !== undefined && answers[q.id] !== '');
  btn.classList.toggle('ready', hasAnswer);
  btn.textContent = currentStep === totalSteps - 1 ? 'GÉNÉRER MON PROGRAMME →' : 'SUIVANT →';
}

function nextStep(){
  const questions = getQuestions();
  const q = questions[currentStep];
  if(!answers[q.id]) return;

  currentStep++;
  if(currentStep >= totalSteps){
    generateProgram();
  } else {
    renderStep();
    document.getElementById('q-body').scrollTop = 0;
  }
}

function goBack(){
  if(currentStep > 0){
    currentStep--;
    renderStep();
  } else {
    showScreen('s-landing');
  }
}

// ══ GENERATION ══
async function generateProgram(){
  showScreen('s-generating');
  const msgs = [
    'Analyse de ton profil...',
    'Calcul de la périodisation...',
    'Sélection des exercices...',
    'Optimisation des charges...',
    'Finalisation du programme...',
  ];
  let mi = 0;
  const interval = setInterval(()=>{
    mi = (mi+1) % msgs.length;
    document.getElementById('gen-sub').textContent = msgs[mi];
  }, 1200);

  try {
    const prompt = buildPrompt();
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system: `Tu es un coach sportif expert de haut niveau. Tu génères des programmes d'entraînement personnalisés en français. 
Réponds UNIQUEMENT en HTML simple (pas de balises html/head/body, juste du contenu).
Utilise ces balises : <h2> pour les grandes sections, <h3> pour les sous-sections, <p> pour les explications, <ul><li> pour les exercices avec <strong>nom</strong> : détails.
Sois précis, scientifique, et adapte vraiment le programme au profil. Maximum 800 tokens.`,
        messages:[{role:'user', content: prompt}]
      })
    });

    clearInterval(interval);
    const data = await response.json();

    if(data.error){
      showError(data.error.message);
      return;
    }

    const content = data.content.map(b=>b.text||'').join('');
    displayProgram(content);

  } catch(err){
    clearInterval(interval);
    showError('Erreur de connexion. Vérifie ta connexion internet et réessaie.');
  }
}

function buildPrompt(){
  if(currentModule === 'muscu'){
    const objLabels = {force:'Force pure',force_def:'Force + Définition',masse:'Prise de masse',perte:'Perte de poids',endurance:'Endurance musculaire',remise:'Remise en forme'};
    const niveauLabels = {debutant:'Débutant',intermediaire:'Intermédiaire',avance:'Avancé',expert:'Expert'};
    const equipLabels = {bodyweight:'Poids du corps',home_hal:'Haltères à domicile',salle:'Salle de sport complète',crossfit:'CrossFit / Functional training',combat_only:'Salle de combat'};
    const equipArr = Array.isArray(answers.equipement) ? answers.equipement.map(e=>equipLabels[e]||e).join(' + ') : (equipLabels[answers.equipement]||answers.equipement);
    const morphoLabels = {ecto:'Ectomorphe',meso:'Mésomorphe',endo:'Endomorphe',unknown:'Inconnue'};

    return `Génère un programme de musculation complet et personnalisé pour ce profil :
- Objectif : ${objLabels[answers.objectif]||answers.objectif}
- Niveau : ${niveauLabels[answers.niveau]||answers.niveau}
- Séances par semaine : ${answers.seances}
- Équipement : ${equipArr}
- Poids : ${answers.poids} kg
- Morphologie : ${morphoLabels[answers.morpho]||answers.morpho}

Programme WARMODE — inclus :
1. Une intro rapide sur la stratégie choisie (périodisation, approche)
2. Le planning hebdomadaire (quels jours, quelles séances)
3. Le détail de chaque séance avec exercices, séries, reps, temps de repos
4. Les charges de départ conseillées adaptées au niveau
5. Les conseils de progression`;
  } else {
    const sportLabels = {boxe:'Boxe Anglaise',muaythai:'Muay Thai',lutte:'Lutte',jjb:'JJB',mma:'MMA',autre:'Sport de combat'};
    const objLabels = {puissance:'Puissance de frappe',cardio:'Cardio & Endurance',explosivite:'Explosivité',force:'Force générale',competition:'Préparation compétition'};
    const equipLabels2 = {combat_only:'Salle de combat',salle:'Salle de sport',functional:'Functional / CrossFit',home:'Domicile',pool:'Piscine'};
    const equipArr2 = Array.isArray(answers.equipement) ? answers.equipement.map(e=>equipLabels2[e]||e).join(' + ') : (equipLabels2[answers.equipement]||answers.equipement);

    return `Génère un programme de renforcement physique spécifique pour ce combattant :
- Discipline : ${sportLabels[answers.sport]||answers.sport}
- Niveau : ${answers.niveau}
- Objectif : ${objLabels[answers.objectif_combat]||answers.objectif_combat}
- Séances de renforcement/semaine : ${answers.seances}
- Équipement : ${equipArr}
- Poids de combat : ${answers.poids} kg

Programme WARMODE Combat — inclus :
1. Analyse des besoins physiques spécifiques à la discipline
2. Planning hebdomadaire intégrant renforcement ET entraînement technique
3. Exercices spécifiques au sport (mouvements fonctionnels, explosivité, zones critiques)
4. Séries, reps, temps de repos adaptés aux sports de combat
5. Conseils de progression et prévention des blessures spécifiques`;
  }
}

function displayProgram(content){
  // Profile tags
  const tags = buildTags();
  const profileIcon = currentModule === 'combat' ? '🥊' : '🏋️';
  const profileName = currentModule === 'combat' ?
    (answers.sport === 'boxe' ? 'Boxe Anglaise' : answers.sport === 'muaythai' ? 'Muay Thai' : answers.sport === 'lutte' ? 'Lutte' : answers.sport === 'jjb' ? 'JJB' : 'MMA') :
    'Programme Musculation';

  document.getElementById('prog-profile').innerHTML = `
    <div style="font-size:28px">${profileIcon}</div>
    <div>
      <div class="prog-profile-name">${profileName}</div>
      <div class="prog-profile-sub">${answers.poids}kg · ${answers.seances} séances/semaine</div>
      <div class="prog-tags">${tags}</div>
    </div>`;

  document.getElementById('prog-content').innerHTML = content;
  showScreen('s-programme');
}

function buildTags(){
  let tags = '';
  if(currentModule === 'muscu'){
    const objMap = {force:'Force',force_def:'Force+Def',masse:'Masse',perte:'Perte de poids',endurance:'Endurance',remise:'Remise en forme'};
    const nivMap = {debutant:'Débutant',intermediaire:'Intermédiaire',avance:'Avancé',expert:'Expert'};
    tags += `<span class="prog-tag red">${objMap[answers.objectif]||answers.objectif}</span>`;
    tags += `<span class="prog-tag orange">${nivMap[answers.niveau]||answers.niveau}</span>`;
    tags += `<span class="prog-tag green">${answers.seances}x/semaine</span>`;
  } else {
    const objMap = {puissance:'Puissance',cardio:'Cardio',explosivite:'Explosivité',force:'Force',competition:'Compétition'};
    tags += `<span class="prog-tag red">${objMap[answers.objectif_combat]||answers.objectif_combat}</span>`;
    tags += `<span class="prog-tag orange">${answers.niveau}</span>`;
    tags += `<span class="prog-tag purple">${answers.seances}x/semaine</span>`;
  }
  return tags;
}

function showError(msg){
  document.getElementById('prog-profile').innerHTML = '';
  document.getElementById('prog-content').innerHTML = `<div class="error-box">❌ ${msg}<br><br>Astuce : Pour que la génération IA fonctionne, le fichier doit être servi depuis un serveur (GitHub Pages). En local, certains navigateurs bloquent les requêtes API.</div>`;
  showScreen('s-programme');
}

function saveProgram(){
  const content = document.getElementById('prog-content').innerHTML;
  const profile = document.getElementById('prog-profile').innerHTML;
  const saved = JSON.parse(localStorage.getItem('warmode_programs')||'[]');
  saved.unshift({date:new Date().toLocaleDateString('fr-FR'),module:currentModule,answers:{...answers},content,profile});
  if(saved.length>10)saved.pop();
  localStorage.setItem('warmode_programs', JSON.stringify(saved));
  alert('Programme sauvegardé !');
}
</script>
